apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: fagprove-monorepo-backend-pr-{{ pr_number }}
  namespace: laerlinger
  labels:
    team: laerlinger
spec:
  ttl: {{ttl}}
  image: {{image}}
  port: 8080
  liveness:
    path: /internal/isalive
    initialDelay: 30
  readiness:
    path: /internal/isready
    initialDelay: 30
  replicas:
    min: 1
    max: 1
  env:
    - name: TZ
      value: Europe/Oslo
    - name: DIGISIS_SOKNAD_SOURCE_URL
      value: https://api.digisis.org/api/foreldrepenger/soknader
    - name: SYNC_EXTERNAL_SOKNADER
      value: "true"
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
  prometheus:
    enabled: true
    path: /internal/metrics
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
  # No database configured — backend automatically falls back to H2 in-memory.
  accessPolicy:
    inbound:
      rules:
        - application: fagprove-monorepo-frontend-pr-{{ pr_number }}
    outbound:
      external:
        - host: api.digisis.org
