openapi: "3.1.0"
info:
  title: Fagprøve Backend API
  description: Backend API for the Fagprøve Monorepo Template
  version: 0.0.1
servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /:
    get:
      operationId: getRoot
      summary: Root endpoint
      responses:
        "200":
          description: Hello World greeting
          content:
            text/plain:
              schema:
                type: string
                examples:
                  - "Hello World!"

  /hello:
    get:
      operationId: getHello
      summary: JSON greeting used by the frontend BFF demo
      responses:
        "200":
          description: Greeting
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    examples:
                      - "Hello World!"

  /internal/isalive:
    get:
      operationId: getInternalIsAlive
      summary: Internal liveness probe
      responses:
        "200":
          description: Application process is alive

  /internal/isready:
    get:
      operationId: getInternalIsReady
      summary: Internal readiness probe
      responses:
        "200":
          description: Application is ready to receive traffic

  /internal/metrics:
    get:
      operationId: getInternalMetrics
      summary: Prometheus metrics
      responses:
        "200":
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string

components:
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    Error:
      type: object
      description: RFC 7807 Problem Details
      required:
        - title
        - status
      properties:
        type:
          type: string
          default: "about:blank"
        title:
          type: string
          examples:
            - "Bad Request"
        status:
          type: integer
          examples:
            - 400
        detail:
          type: string
          examples:
            - "Navn kan ikke være tomt"

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
