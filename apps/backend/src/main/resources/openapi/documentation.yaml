openapi: "3.1.0"
info:
  title: Fagprøve Backend API
  description: Backend API for the Fagprøve Monorepo Template
  version: 0.0.1
servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /:
    get:
      operationId: getRoot
      summary: Root endpoint
      responses:
        "200":
          description: Hello World greeting
          content:
            text/plain:
              schema:
                type: string
                examples:
                  - "Hello World!"

  /hello:
    get:
      operationId: getHello
      summary: JSON greeting used by the frontend BFF demo
      responses:
        "200":
          description: Greeting
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    examples:
                      - "Hello World!"

  /isalive:
    get:
      operationId: getIsAlive
      summary: Public liveness probe
      responses:
        "200":
          description: Application process is alive

  /isready:
    get:
      operationId: getIsReady
      summary: Public readiness probe
      description: Checks that the application can reach the database.
      responses:
        "200":
          description: Application and database are ready
        "503":
          description: Database is unavailable

  /api/v1/foreldrepenger/soknader:
    get:
      operationId: listForeldrepengerSoknader
      summary: List seeded foreldrepenger applications for demo processing
      security:
        - idporten: []
      responses:
        "200":
          description: Seeded applications suitable for frontend listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SoknadListeResponse"
        "500":
          $ref: "#/components/responses/InternalError"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/foreldrepenger/vedtak:
    post:
      operationId: startForeldrepengerBehandling
      summary: Start rule processing for a selected application
      description: >
        The request identifies a søknad by UUID. The response returns the numeric sak id
        (behandling id) that must be used with `/api/v1/foreldrepenger/saker/{id}`.
        Automatic outcomes are finalized immediately. Manual-review outcomes are stored
        as an open case with regelspor and no final vedtak until a manual decision is saved.
        Repeated calls for the same søknad are idempotent and return the existing case.
      security:
        - idporten: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartBehandlingRequest"
      responses:
        "201":
          description: Processing started and the resulting case state was created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BehandlingResultatResponse"
        "200":
          description: Existing case for the søknad returned idempotently
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BehandlingResultatResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/foreldrepenger/saker/{id}:
    get:
      operationId: getForeldrepengerSak
      summary: Get full case data by sak id
      description: The path id is the numeric behandling/sak id returned by `POST /api/v1/foreldrepenger/vedtak`.
      security:
        - idporten: []
      parameters:
        - $ref: "#/components/parameters/SakId"
      responses:
        "200":
          description: Case data with søknad, regelspor, status, and vedtak or manual-review state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SakResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/foreldrepenger/saker/{id}/intern-merknad:
    get:
      operationId: getForeldrepengerInternMerknad
      summary: Get the internal note for a case
      description: >
        Returns internal-only follow-up metadata for a case. The note is separate
        from ordinary case and decision data and must not be shared with mor,
        medmor or far. If no note exists, the endpoint returns an empty default state.
      security:
        - idporten: []
      parameters:
        - $ref: "#/components/parameters/SakId"
      responses:
        "200":
          description: Internal note state for the case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternMerknadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      operationId: upsertForeldrepengerInternMerknad
      summary: Save or update the internal note for a case
      description: >
        Marks whether a case is complicated or challenging and stores an internal
        comment for internal follow-up, learning and best practice. Comments are
        trimmed before storage. A non-empty comment is required when `komplisert`
        is true.
      security:
        - idporten: []
      parameters:
        - $ref: "#/components/parameters/SakId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternMerknadRequest"
      responses:
        "200":
          description: Internal note saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternMerknadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/foreldrepenger/interne-merknader:
    get:
      operationId: listForeldrepengerInterneMerknader
      summary: List cases with internal follow-up
      description: >
        Teamleder/avdelingsleder overview of cases marked for internal follow-up,
        sorted by latest internal note update descending. Only internal follow-up
        fields are returned; ordinary case responses remain unchanged.
      security:
        - idporten: []
      responses:
        "200":
          description: Cases marked with internal follow-up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InterneMerknaderResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/foreldrepenger/saker/{id}/beslutning:
    post:
      operationId: decideForeldrepengerSak
      summary: Store a manual decision for a case awaiting manual review
      description: >
        Supports manual innvilgelse and avslag. The endpoint rejects cases that are
        already finalized or not awaiting manual decision.
      security:
        - idporten: []
      parameters:
        - $ref: "#/components/parameters/SakId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManuellBeslutningRequest"
      responses:
        "200":
          description: Manual decision saved and case finalized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SakResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /internal/isalive:
    get:
      operationId: getInternalIsAlive
      summary: Internal liveness probe
      responses:
        "200":
          description: Application process is alive

  /internal/isready:
    get:
      operationId: getInternalIsReady
      summary: Internal readiness probe
      description: Checks that the application can reach the database.
      responses:
        "200":
          description: Application and database are ready
        "503":
          description: Database is unavailable

  /internal/metrics:
    get:
      operationId: getInternalMetrics
      summary: Prometheus metrics
      responses:
        "200":
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string

  /openapi:
    get:
      operationId: getSwaggerUi
      summary: Swagger UI
      responses:
        "200":
          description: Swagger UI for the API documentation

  /openapi.json:
    get:
      operationId: getOpenApiDocument
      summary: OpenAPI document
      responses:
        "200":
          description: OpenAPI document served as YAML
          content:
            application/yaml:
              schema:
                type: string
        "404":
          description: OpenAPI document was not found

components:
  securitySchemes:
    idporten:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        ID-porten JWT forwarded by Wonderwall. Foreldrepenger API routes require
        this token when IDPORTEN_* configuration is present; local development
        keeps auth disabled when ID-porten is not configured.

  parameters:
    SakId:
      name: id
      in: path
      required: true
      description: Numeric behandling/sak id returned by `POST /api/v1/foreldrepenger/vedtak`
      schema:
        type: integer
        format: int64
        minimum: 1

  schemas:
    SoknadListeResponse:
      type: object
      required:
        - soknader
      properties:
        soknader:
          type: array
          items:
            $ref: "#/components/schemas/SoknadListe"

    SoknadListe:
      type: object
      description: Application summary without raw fødselsnummer
      required:
        - id
        - sokerIdent
        - innsendt
        - termindato
        - rettsforhold
        - dekningsgrad
        - antallBarn
        - oppgittAarsinntektKroner
      properties:
        id:
          type: string
          format: uuid
        sokerIdent:
          type: string
          description: Synthetic display identifier for demo use, not raw fnr
          examples:
            - TEST-0001
        innsendt:
          type: string
          format: date
        termindato:
          type: string
          format: date
        rettsforhold:
          type: string
          examples:
            - BEGGE_FORELDRE
        dekningsgrad:
          type: string
          examples:
            - HUNDRE_PROSENT
        antallBarn:
          type: integer
        oppgittAarsinntektKroner:
          type: integer

    StartBehandlingRequest:
      type: object
      required:
        - soknadId
      properties:
        soknadId:
          type: string
          format: uuid
          minLength: 1

    BehandlingResultatResponse:
      type: object
      required:
        - sakId
        - soknadId
        - status
        - vedtaksvariant
        - regelspor
      properties:
        sakId:
          type: integer
          format: int64
        soknadId:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/SakStatus"
        vedtaksvariant:
          $ref: "#/components/schemas/Vedtaksvariant"
        regelspor:
          type: array
          items:
            $ref: "#/components/schemas/Regelresultat"
        vedtak:
          $ref: "#/components/schemas/Vedtak"
        manuellVurdering:
          $ref: "#/components/schemas/ManuellVurdering"

    SakResponse:
      type: object
      required:
        - sakId
        - soknad
        - status
        - opprettetTidspunkt
        - regelspor
      properties:
        sakId:
          type: integer
          format: int64
        soknad:
          $ref: "#/components/schemas/Saksdata"
        status:
          $ref: "#/components/schemas/SakStatus"
        opprettetTidspunkt:
          type: string
          format: date-time
        ferdigstiltTidspunkt:
          type: string
          format: date-time
        regelspor:
          type: array
          items:
            $ref: "#/components/schemas/Regelresultat"
        vedtak:
          $ref: "#/components/schemas/Vedtak"
        manuellVurdering:
          $ref: "#/components/schemas/ManuellVurdering"

    InternMerknadRequest:
      type: object
      required:
        - komplisert
        - kommentar
        - oppdatertAv
      properties:
        komplisert:
          type: boolean
          description: Whether the case is marked as complicated or challenging
        kommentar:
          type: string
          maxLength: 1000
          description: >
            Internal-only comment. Must be non-empty when `komplisert` is true
            and must not contain control characters.
        oppdatertAv:
          type: string
          minLength: 1
          maxLength: 100
          description: Saksbehandler identifier for the latest update

    InternMerknadResponse:
      type: object
      required:
        - sakId
        - komplisert
        - kommentar
        - oppdatertAv
        - oppdatertTidspunkt
      properties:
        sakId:
          type: integer
          format: int64
        komplisert:
          type: boolean
        kommentar:
          type: string
        oppdatertAv:
          type:
            - string
            - "null"
        oppdatertTidspunkt:
          type:
            - string
            - "null"
          format: date-time

    InterneMerknaderResponse:
      type: object
      required:
        - saker
      properties:
        saker:
          type: array
          items:
            $ref: "#/components/schemas/InternMerknadOversikt"

    InternMerknadOversikt:
      type: object
      required:
        - sakId
        - saksnummer
        - sokerIdent
        - status
        - vedtaksvariant
        - komplisert
        - kommentar
        - oppdatertAv
        - oppdatertTidspunkt
      properties:
        sakId:
          type: integer
          format: int64
        saksnummer:
          type: string
          description: Display case number derived for the demo
          examples:
            - SAK-000001
        sokerIdent:
          type: string
          description: Synthetic display identifier for demo use, not raw fnr
          examples:
            - TEST-0001
        status:
          $ref: "#/components/schemas/SakStatus"
        vedtaksvariant:
          $ref: "#/components/schemas/Vedtaksvariant"
        komplisert:
          type: boolean
        kommentar:
          type: string
        oppdatertAv:
          type: string
        oppdatertTidspunkt:
          type: string
          format: date-time

    Saksdata:
      type: object
      description: Case application data without raw fødselsnummer
      required:
        - id
        - sokerIdent
        - erNorskBorger
        - innsendt
        - termindato
        - rettsforhold
        - dekningsgrad
        - antallBarn
        - oppgittAarsinntektKroner
        - inntekter
      properties:
        id:
          type: string
          format: uuid
        sokerIdent:
          type: string
          description: Synthetic display identifier for demo use, not raw fnr
        erNorskBorger:
          type: boolean
        innsendt:
          type: string
          format: date
        termindato:
          type: string
          format: date
        rettsforhold:
          type: string
        dekningsgrad:
          type: string
        antallBarn:
          type: integer
        oppgittAarsinntektKroner:
          type: integer
        inntekter:
          type: array
          items:
            $ref: "#/components/schemas/Inntekt"

    Inntekt:
      type: object
      required:
        - maned
        - type
        - belopKroner
      properties:
        maned:
          type: string
          pattern: "^\\d{4}-\\d{2}$"
          examples:
            - "2026-05"
        type:
          type: string
          examples:
            - ARBEID
        belopKroner:
          type: integer

    Regelresultat:
      type: object
      required:
        - regel
        - status
        - begrunnelse
      properties:
        regel:
          type: string
          enum:
            - OPPTJENING
            - ENGANGSSTONAD
            - BEREGNINGSGRUNNLAG
            - STONADSPERIODE
            - KVOTEFORDELING
        status:
          type: string
          enum:
            - OPPFYLT
            - IKKE_OPPFYLT
            - MANUELL_VURDERING
        begrunnelse:
          type: string

    ManuellVurdering:
      type: object
      required:
        - grunn
      properties:
        grunn:
          type: string

    Vedtak:
      type: object
      required:
        - variant
        - begrunnelse
      properties:
        variant:
          $ref: "#/components/schemas/Vedtaksvariant"
        begrunnelse:
          type: string
        belopKroner:
          type: integer
        stonadsperiode:
          $ref: "#/components/schemas/Stonadsperiode"
        kvoter:
          $ref: "#/components/schemas/Kvoter"
        besluttetAv:
          type: string
        besluttetTidspunkt:
          type: string
          format: date-time

    Stonadsperiode:
      type: object
      required:
        - fom
        - tom
        - uker
      properties:
        fom:
          type: string
          format: date
        tom:
          type: string
          format: date
        uker:
          type: integer

    Kvoter:
      type: object
      required:
        - modrekvoteUker
        - fedrekvoteUker
        - fellesperiodeUker
        - bonusuker
        - forskuddUker
        - totalUker
      properties:
        modrekvoteUker:
          type: integer
        fedrekvoteUker:
          type: integer
        fellesperiodeUker:
          type: integer
        bonusuker:
          type: integer
        forskuddUker:
          type: integer
        totalUker:
          type: integer

    ManuellBeslutningRequest:
      type: object
      required:
        - type
        - begrunnelse
        - besluttetAv
      properties:
        type:
          $ref: "#/components/schemas/ManuellBeslutningType"
        begrunnelse:
          type: string
          minLength: 1
          maxLength: 1000
        besluttetAv:
          type: string
          minLength: 1
          maxLength: 100

    SakStatus:
      type: string
      enum:
        - OPPRETTET
        - TIL_MANUELL_VURDERING
        - FERDIGSTILT

    Vedtaksvariant:
      type: string
      enum:
        - INNVILGET
        - AVSLAG
        - ENGANGSSTONAD
        - MANUELL_VURDERING

    ManuellBeslutningType:
      type: string
      enum:
        - INNVILGELSE
        - AVSLAG

    Error:
      type: object
      description: RFC 7807 Problem Details
      required:
        - title
        - status
      properties:
        type:
          type: string
          default: "about:blank"
        title:
          type: string
          examples:
            - "Bad Request"
        status:
          type: integer
          examples:
            - 400
        detail:
          type: string
          examples:
            - "Forespørselen inneholder ugyldige verdier"
        errors:
          type: array
          description: Field-level validation errors when the request reached DTO validation.
          items:
            $ref: "#/components/schemas/FieldError"

    FieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          examples:
            - soknadId
        message:
          type: string
          examples:
            - "soknadId må være en gyldig UUID"

  responses:
    BadRequest:
      description: Invalid JSON, missing required fields, invalid parameters, or validation errors
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            validation:
              summary: Field validation failed
              value:
                title: Bad Request
                status: 400
                detail: Forespørselen inneholder ugyldige verdier
                errors:
                  - field: soknadId
                    message: soknadId må være en gyldig UUID
            invalidJson:
              summary: Body could not be parsed
              value:
                title: Bad Request
                status: 400
                detail: Forespørselen har ugyldig JSON eller mangler påkrevde felter
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            title: Not Found
            status: 404
            detail: Saken finnes ikke
    Conflict:
      description: Request conflicts with the current resource state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            title: Conflict
            status: 409
            detail: Saken venter ikke på manuell beslutning
    Unauthorized:
      description: Missing or invalid ID-porten JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            title: Unauthorized
            status: 401
            detail: Token mangler eller er ugyldig
    UnsupportedMediaType:
      description: Request body must use JSON content type
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            title: Unsupported Media Type
            status: 415
            detail: Content-Type må være application/json
    InternalError:
      description: Internal server error without stack traces or implementation details
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            title: Internal Server Error
            status: 500
            detail: En uventet feil oppstod
