openapi: "3.1.0"
info:
  title: Fagprøve Backend API
  description: Backend API for the Fagprøve Monorepo Template
  version: 0.0.1
servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /:
    get:
      operationId: getRoot
      summary: Root endpoint
      responses:
        "200":
          description: Hello World greeting
          content:
            text/plain:
              schema:
                type: string
                examples:
                  - "Hello World!"

  /hello:
    get:
      operationId: getHello
      summary: JSON greeting used by the frontend BFF demo
      responses:
        "200":
          description: Greeting
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
                    examples:
                      - "Hello World!"

  /internal/isalive:
    get:
      operationId: getInternalIsAlive
      summary: Internal liveness probe
      responses:
        "200":
          description: Application process is alive

  /internal/isready:
    get:
      operationId: getInternalIsReady
      summary: Internal readiness probe
      responses:
        "200":
          description: Application is ready to receive traffic

  /internal/metrics:
    get:
      operationId: getInternalMetrics
      summary: Prometheus metrics
      responses:
        "200":
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string

  /cities:
    get:
      operationId: listCities
      summary: List all cities
      responses:
        "200":
          description: List of all cities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CityResponse"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createCity
      summary: Create a new city
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/City"
      responses:
        "201":
          description: City created successfully
          content:
            application/json:
              schema:
                type: integer
                description: The ID of the created city
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /cities/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      operationId: getCity
      summary: Get a city by ID
      responses:
        "200":
          description: City found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CityResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      operationId: updateCity
      summary: Update a city by ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/City"
      responses:
        "200":
          description: City updated successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: deleteCity
      summary: Delete a city by ID
      responses:
        "200":
          description: City deleted successfully
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /users:
    get:
      operationId: listUsers
      summary: List all users
      responses:
        "200":
          description: List of all users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createUser
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                type: integer
                description: The ID of the created user
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /users/{id}:
    parameters:
      - $ref: "#/components/parameters/ResourceId"
    get:
      operationId: getUser
      summary: Get a user by ID
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    put:
      operationId: updateUser
      summary: Update a user by ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "200":
          description: User updated successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: deleteUser
      summary: Delete a user by ID
      responses:
        "200":
          description: User deleted successfully
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    City:
      type: object
      required:
        - name
        - population
      properties:
        name:
          type: string
          maxLength: 255
          examples:
            - "Oslo"
        population:
          type: integer
          minimum: 0
          examples:
            - 709037

    CityResponse:
      type: object
      required:
        - id
        - name
        - population
      properties:
        id:
          type: integer
        name:
          type: string
        population:
          type: integer

    User:
      type: object
      required:
        - name
        - age
      properties:
        name:
          type: string
          maxLength: 50
          examples:
            - "Ola Nordmann"
        age:
          type: integer
          minimum: 0
          maximum: 150
          examples:
            - 30

    UserResponse:
      type: object
      required:
        - id
        - name
        - age
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: integer

    Error:
      type: object
      description: RFC 7807 Problem Details
      required:
        - title
        - status
      properties:
        type:
          type: string
          default: "about:blank"
        title:
          type: string
          examples:
            - "Bad Request"
        status:
          type: integer
          examples:
            - 400
        detail:
          type: string
          examples:
            - "Navn kan ikke være tomt"

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
