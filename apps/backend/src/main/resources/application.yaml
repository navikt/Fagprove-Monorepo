ktor:
    application:
        modules:
            - no.nav.fagprove.ApplicationKt.module
    deployment:
        port: "$BACKEND_PORT:8080"
# Database config is read from environment variables:
# POSTGRES_URL, POSTGRES_USER, POSTGRES_PASSWORD
# Set USE_TESTCONTAINERS=true for local development
# DIGISIS_SOKNAD_SOURCE_URL defaults to https://api.digisis.org/api/foreldrepenger/soknader
# Set SYNC_EXTERNAL_SOKNADER=false and SEED_TEST_SOKNADER=true to use deterministic local/test seed data